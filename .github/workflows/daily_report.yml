name: Daily Macro Pulse Report

on:
  schedule:
    # BEGIN GENERATED SCHEDULES
    # KR | 16:58 KST | 07:58 UTC | Mon-Fri
    - cron: '58 07 * * 1-5'
    # US | 06:28 KST | 21:28 UTC | Tue-Sat KST
    - cron: '28 21 * * 1-5'
    # END GENERATED SCHEDULES
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      REPORT_FORMAT_CONFIG: config/report_formats.json
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Build runtime image
      run: docker build -t macro-pulse:daily .

    - name: Run unit tests in Docker
      run: |
        docker run --rm \
          -v "$PWD:/app" \
          -w /app \
          macro-pulse:daily \
          sh -lc "uv run --frozen python -m unittest discover tests 2>&1 | tee unit-test.log"

    - name: Run Macro Pulse Bot in Docker
      run: |
        docker run --rm \
          -e REPORT_FORMAT_CONFIG \
          -e TELEGRAM_BOT_TOKEN \
          -e TELEGRAM_CHAT_ID \
          -v "$PWD:/app" \
          -w /app \
          macro-pulse:daily \
          sh -lc "uv run --frozen python src/main.py 2>&1 | tee macro-pulse.log"
      
    - name: Validate generated report
      if: success()
      run: test -s macro_pulse_report.html

    - name: Prepare public directory
      if: success()
      run: |
        mkdir -p public
        mv macro_pulse_report.html public/index.html

    - name: Configure GitHub Pages
      if: success()
      uses: actions/configure-pages@v5

    - name: Upload GitHub Pages artifact
      if: success()
      uses: actions/upload-pages-artifact@v4
      with:
        path: ./public

    - name: Upload workflow artifacts
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: daily-report-artifacts
        path: |
          macro_pulse_report.html
          public/index.html
          macro-pulse.log
          unit-test.log
        if-no-files-found: ignore

  deploy:
    if: ${{ needs.build.result == 'success' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

  notify-failure:
    if: ${{ always() && (needs.build.result == 'failure' || needs.deploy.result == 'failure') }}
    needs:
      - build
      - deploy
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
    - name: Send failure notification
      if: env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
      run: |
        curl --silent --show-error --fail \
          --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
          --data-urlencode "text=Macro Pulse workflow failed: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
          "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"
